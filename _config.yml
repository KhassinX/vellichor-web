# UI strings (skip-link y "Part of ecosystem") consumed by base.html
ui_strings:
  en:
    skip_to_main: "Skip to main content"
    part_of_ecosystem_prefix: "Part of the"
    part_of_ecosystem_label: "KhassinX ecosystem"
    ecosystem_url: "https://khassinx.com"
  es:
    skip_to_main: "Saltar al contenido principal"
    part_of_ecosystem_prefix: "Parte del"
    part_of_ecosystem_label: "ecosistema KhassinX"
    ecosystem_url: "https://khassinx.com/es/"
  pt-BR:
    skip_to_main: "Pular para o conteúdo principal"
    part_of_ecosystem_prefix: "Parte do"
    part_of_ecosystem_label: "ecossistema KhassinX"
    ecosystem_url: "https://khassinx.com"
  de:
    skip_to_main: "Zum Hauptinhalt springen"
    part_of_ecosystem_prefix: "Teil des"
    part_of_ecosystem_label: "KhassinX-Ökosystems"
    ecosystem_url: "https://khassinx.com"

# Jekyll config
markdown: kramdown
plugins:
  - jekyll-redirect-from
  - jekyll-sitemap

exclude:
  - README.md
  - CONTRIBUTING.md
  - .gitignore
  - LICENSE

# Jekyll por default ignora dotfiles/dotdirs. .well-known DEBE servirse
# (RFC 9116 security.txt requiere path exacto /.well-known/security.txt).
include:
  - .well-known
