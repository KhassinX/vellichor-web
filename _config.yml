title: Vellichor
description: PDF Q&A on-device for Apple platforms. Apple Intelligence Foundation Models. Universal iPhone, iPad, Mac, and Apple Watch. Your PDFs never leave your device.
url: https://vellichor.khassinx.com
lang: en

# Layer 2 brand tokens (Vellichor specific) extending Layer 3 primitives
app_tokens_css: /assets/css/vellichor-tokens.css

# Favicons (derived from Icon Composer .icon bundle 2026-05-28 — page+lines composition)
# SVG primary for modern browsers, PNG fallbacks for legacy + iOS home screen
favicon_svg: /assets/favicons/favicon.svg
favicon_32: /assets/favicons/favicon-32.png
favicon_16: /assets/favicons/favicon-16.png
apple_touch_icon: /assets/favicons/apple-touch-icon.png

# Social / Open Graph + Twitter
og_site_name: Vellichor
og_image: /assets/og/og-image.png
og_image_width: 1200
og_image_height: 630
og_image_alt: "Vellichor — PDF Q&A on-device for Apple platforms"
twitter_card: summary_large_image

# JSON-LD (SoftwareApplication, publisher KhassinX)
org:
  name: KhassinX

# Navigation — keyed per locale. base.html selects via page.lang con fallback a 'en'.
nav:
  en:
    - title: Legal
      url: /legal/
    - title: Press
      url: /press/
  es:
    - title: Legal
      url: /es/legal/
    - title: Prensa
      url: /es/press/

footer_nav:
  en:
    - title: Privacy
      url: /legal/privacy/
    - title: Terms
      url: /legal/terms/
    - title: Security
      url: /security/
    - title: Press
      url: /press/
    - title: Contact
      url: mailto:hello@khassinx.com
  es:
    - title: Privacidad
      url: /es/legal/privacy/
    - title: Términos
      url: /es/legal/terms/
    - title: Seguridad
      url: /es/security/
    - title: Prensa
      url: /es/press/
    - title: Contacto
      url: mailto:hello@khassinx.com

# UI strings (skip-link y "Part of ecosystem") consumed by base.html
ui_strings:
  en:
    skip_to_main: "Skip to main content"
    part_of_ecosystem_prefix: "Part of the"
    part_of_ecosystem_label: "KhassinX ecosystem"
    ecosystem_url: "https://khassinx.com"
  es:
    skip_to_main: "Saltar al contenido principal"
    part_of_ecosystem_prefix: "Parte del"
    part_of_ecosystem_label: "ecosistema KhassinX"
    ecosystem_url: "https://khassinx.com/es/"

# Jekyll config
markdown: kramdown
plugins:
  - jekyll-redirect-from
  - jekyll-sitemap

exclude:
  - README.md
  - CONTRIBUTING.md
  - .gitignore
  - LICENSE

# Jekyll por default ignora dotfiles/dotdirs. .well-known DEBE servirse
# (RFC 9116 security.txt requiere path exacto /.well-known/security.txt).
include:
  - .well-known
